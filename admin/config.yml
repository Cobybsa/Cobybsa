          - { label: "CTA título", name: "cta_titulo", widget: "string", required: false }
          - { label: "CTA descripción", name: "cta_descripcion", widget: "text", required: false }
          - { label: "CTA texto", name: "cta_texto", widget: "string", required: false }
          - { label: "CTA link", name: "cta_link", widget: "string", required: false }


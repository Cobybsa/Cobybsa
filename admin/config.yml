backend:
  name: git-gateway
  branch: main

media_folder: "assets/img"
public_folder: "/assets/img"

collections:

  - name: "novedades"
    label: "Novedades"
    folder: "content/novedades"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Fecha", name: "date", widget: "datetime" }
      - { label: "Etiqueta", name: "tag", widget: "string", required: false }
      - { label: "Imagen", name: "image", widget: "image", required: false }
      - { label: "Contenido", name: "body", widget: "markdown" }

  - name: "proyectos"
    label: "Proyectos individuales"
    folder: "content/proyectos"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Cliente", name: "cliente", widget: "string", required: false }
      - { label: "Ubicación", name: "ubicacion", widget: "string", required: false }
      - { label: "Fecha", name: "date", widget: "datetime" }
      - { label: "Categoría", name: "categoria", widget: "string", required: false }
      - { label: "Imagen principal", name: "image", widget: "image", required: false }
      - label: "Galería"
        name: "gallery"
        widget: "list"
        required: false
        fields:
          - { label: "Imagen", name: "image", widget: "image" }
      - { label: "Descripción", name: "body", widget: "markdown" }

  - name: "paginas"
    label: "Páginas"
    files:

      - label: "Inicio"
        name: "inicio"
        file: "content/paginas/inicio.json"
        fields:
          - { label: "Badge del hero", name: "badge", widget: "string" }
          - { label: "Título del hero", name: "titulo", widget: "string" }
          - { label: "Descripción del hero", name: "descripcion", widget: "text" }
          - { label: "Texto extra del hero", name: "extra", widget: "text", required: false }
          - { label: "CTA principal - texto", name: "cta_principal_texto", widget: "string" }
          - { label: "CTA principal - link", name: "cta_principal_link", widget: "string" }
          - { label: "CTA secundario - texto", name: "cta_secundario_texto", widget: "string" }
          - { label: "CTA secundario - link", name: "cta_secundario_link", widget: "string" }

          - label: "Estadísticas"
            name: "estadisticas"
            widget: "list"
            fields:
              - { label: "Número", name: "numero", widget: "string" }
              - { label: "Texto", name: "texto", widget: "string" }

          - label: "Capacidades destacadas"
            name: "capacidades_destacadas"
            widget: "list"
            fields:
              - { label: "Número", name: "numero", widget: "string" }
              - { label: "Título", name: "titulo", widget: "string" }
              - { label: "Descripción", name: "descripcion", widget: "text" }
              - { label: "Link", name: "link", widget: "string", required: false }

          - { label: "Título del equipo", name: "equipo_titulo", widget: "string" }
          - { label: "Descripción del equipo", name: "equipo_descripcion", widget: "text" }

          - label: "Equipo destacado"
            name: "equipo"
            widget: "list"
            required: false
            fields:
              - { label: "Nombre", name: "nombre", widget: "string" }
              - { label: "Cargo", name: "cargo", widget: "string" }
              - { label: "Descripción", name: "descripcion", widget: "text" }

          - { label: "Título sectores", name: "sectores_titulo", widget: "string" }

          - label: "Sectores"
            name: "sectores"
            widget: "list"
            required: false
            field: { label: "Sector", name: "sector", widget: "string" }

          - { label: "CTA final - título", name: "cta_final_titulo", widget: "string" }
          - { label: "CTA final - descripción", name: "cta_final_descripcion", widget: "text" }
          - { label: "CTA final - texto botón", name: "cta_final_boton_texto", widget: "string" }
          - { label: "CTA final - link botón", name: "cta_final_boton_link", widget: "string" }

          - { label: "Título novedades", name: "novedades_titulo", widget: "string", required: false }
          - { label: "Descripción novedades", name: "novedades_descripcion", widget: "text", required: false }

          - label: "Novedades destacadas"
            name: "novedades_destacadas"
            widget: "list"
            required: false
            fields:
              - { label: "Etiqueta", name: "tag", widget: "string", required: false }
              - { label: "Título", name: "titulo", widget: "string" }
              - { label: "Descripción", name: "descripcion", widget: "text", required: false }
              - { label: "Imagen", name: "imagen", widget: "image", required: false }
              - { label: "Fecha", name: "fecha", widget: "string", required: false }
              - { label: "Link", name: "link", widget: "string", required: false }

      - label: "Historia"
        name: "historia"
        file: "content/paginas/historia.json"
        fields:
          - { label: "Badge", name: "badge", widget: "string" }
          - { label: "Título", name: "titulo", widget: "string" }
          - { label: "Descripción", name: "descripcion", widget: "text" }
          - { label: "Título historia principal", name: "historia_titulo", widget: "string" }
          - { label: "Texto historia principal", name: "historia_texto", widget: "markdown" }

          - label: "Bloques de trayectoria"
            name: "bloques"
            widget: "list"
            required: false
            fields:
              - { label: "Año o etapa", name: "etapa", widget: "string" }
              - { label: "Título", name: "titulo", widget: "string" }
              - { label: "Texto", name: "texto", widget: "text" }
              - label: "Puntos"
                name: "puntos"
                widget: "list"
                required: false
                field: { label: "Punto", name: "punto", widget: "string" }

          - { label: "Misión kicker", name: "mision_kicker", widget: "string", required: false }
          - { label: "Misión título", name: "mision_titulo", widget: "string", required: false }
          - { label: "Misión descripción", name: "mision_descripcion", widget: "text", required: false }

          - label: "Misión principios"
            name: "mision_principios"
            widget: "list"
            required: false
            fields:
              - { label: "Número", name: "numero", widget: "string" }
              - { label: "Título", name: "titulo", widget: "string" }
              - { label: "Descripción", name: "descripcion", widget: "text" }

      - label: "Capacidades"
        name: "capacidades"
        file: "content/paginas/capacidades.json"
        fields:
          - { label: "Badge", name: "badge", widget: "string" }
          - { label: "Título", name: "titulo", widget: "string" }
          - { label: "Descripción", name: "descripcion", widget: "text" }

          - label: "Lista de capacidades"
            name: "capacidades"
            widget: "list"
            required: false
            fields:
              - { label: "Título", name: "titulo", widget: "string" }
              - { label: "Descripción", name: "descripcion", widget: "text" }
              - label: "Puntos"
                name: "puntos"
                widget: "list"
                required: false
                field: { label: "Punto", name: "punto", widget: "string" }
              - { label: "Link", name: "link", widget: "string", required: false }

          - { label: "CTA título", name: "cta_titulo", widget: "string", required: false }
          - { label: "CTA descripción", name: "cta_descripcion", widget: "text", required: false }

      - label: "Proyectos"
        name: "proyectos_pagina"
        file: "content/paginas/proyectos.json"
        fields:
          - { label: "Badge", name: "badge", widget: "string", required: false }
          - { label: "Título", name: "titulo", widget: "string", required: false }
          - { label: "Descripción", name: "descripcion", widget: "text", required: false }
          - { label: "CTA título", name: "cta_titulo", widget: "string", required: false }
          - { label: "CTA descripción", name: "cta_descripcion", widget: "text", required: false }
          - { label: "CTA texto", name: "cta_texto", widget: "string", required: false }
          - { label: "CTA link", name: "cta_link", widget: "string", required: false }

      - label: "Corte láser industrial"

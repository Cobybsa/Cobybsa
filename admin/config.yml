          - { label: "Descripción", name: "descripcion", widget: "text", required: false }
          - { label: "Imagen hero", name: "imagen", widget: "image", required: false }
          - { label: "Título sección", name: "seccion_titulo", widget: "string", required: false }
          - { label: "Texto sección", name: "seccion_texto", widget: "text", required: false }
          - label: "Puntos clave"
